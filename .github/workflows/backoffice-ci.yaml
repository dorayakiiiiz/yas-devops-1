name: backoffice service ci

on:
  push:
    branches: ["**"]
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-ci.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-ci.yaml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backoffice/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backoffice

      # Run tests with coverage
      - name: Run Tests with Coverage
        run: npm run test:coverage
        working-directory: ./backoffice
        continue-on-error: false

      # Upload coverage report as artifact
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backoffice/coverage/
          retention-days: 7

      # Display coverage summary in PR
      - name: Coverage Summary
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        uses: dorny/test-reporter@v1
        with:
          name: Backoffice Unit Test Results
          path: "backoffice/coverage/junit.xml"
          reporter: java-junit

      # Coverage comment on PR using vitest-coverage-report
      - name: Report Coverage
        if: ${{ github.event_name == 'pull_request' && env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: ./backoffice
          vitest-run-command: npm run test:coverage
          coverage-file-path: ./coverage/coverage-final.json
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backoffice

      - name: Run Build
        run: npm run build
        working-directory: ./backoffice
      
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backoffice

      - name: Setup Snyk
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: snyk/actions/setup@master

      - name: Run Snyk Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test ./backoffice --severity-threshold=medium --sarif-file-output=snyk-results.sarif

      - name: Upload Snyk results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && !cancelled() && hashFiles('snyk-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-results.sarif

      - name: Log in to Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/yas-backoffice:latest