name: backoffice service ci

on:
  push:
    branches: ["**"]
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-ci.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-ci.yaml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backoffice/package-lock.json'

      - name: Install Dependencies
        run: npm install
        working-directory: ./backoffice

      - name: Run Lint
        run: npm run lint --if-present
        working-directory: ./backoffice

      - name: Run Tests with Vitest Coverage
        run: npm run test:coverage --if-present
        working-directory: ./backoffice
        continue-on-error: true

      - name: Extract Coverage Percentage
        id: coverage
        run: |
          cd ./backoffice
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
          else
            COVERAGE=0
          fi
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "📊 Coverage: ${COVERAGE}%"

      - name: Check Coverage Threshold
        run: |
          THRESHOLD= 70
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          
          echo "🎯 Threshold: ${THRESHOLD}%"
          echo "📈 Current: ${COVERAGE}%"
          
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below ${THRESHOLD}%"
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
          fi

      - name: Test Results
        continue-on-error: true
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: backoffice-Service-Unit-Test-Results
          path: "backoffice/coverage/*.xml"
          reporter: java-junit

      - name: Comment Coverage on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ github.event_name == 'pull_request' && steps.coverage.outputs.coverage != '' }}
        with:
          header: coverage
          message: |
            ## 📊 Backoffice Coverage Report (Vitest)
            
            | Metric | Value |
            |--------|-------|
            | **Line Coverage** | ${{ steps.coverage.outputs.coverage }}% |
            | **Threshold** | 70% |
            | **Status** | ${{ steps.coverage.outputs.coverage >= 70 && '✅ PASS' || '❌ FAIL' }} |
            
            ${{ steps.coverage.outputs.coverage >= 70 && '🎉 Coverage meets requirements!' || '⚠️ Please add more tests to increase coverage.' }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backoffice-coverage-report
          path: ${{github.workspace}}/backoffice/coverage/

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backoffice/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backoffice

      - name: Run Build
        run: npm run build
        working-directory: ./backoffice

      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backoffice

      - name: Setup Snyk
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: snyk/actions/setup@master

      - name: Run Snyk Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test ./backoffice --severity-threshold=medium --sarif-file-output=snyk-results.sarif

      - name: Upload Snyk results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && !cancelled() && hashFiles('snyk-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-results.sarif

      - name: Log in to Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/yas-backoffice:latest