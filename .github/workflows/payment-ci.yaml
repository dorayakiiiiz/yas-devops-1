name: payment service ci

on:
  push:
    branches: ["**"]
    paths:
      - "payment/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/payment-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "payment/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/payment-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  #Phần scan
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      #kiểm tra phát hiện secret/credential bị leak
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      #Snyk scan
      - name: Setup Snyk
        uses: snyk/actions/setup@master
      
      - name: Run Snyk Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test ./payment --severity-threshold=medium --sarif-file-output=snyk-results.sarif
      
      - name: Upload Snyk results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-results.sarif

  #Phần test 
  test:
    runs-on: ubuntu-latest
    needs: security-scan  #chỉ chạy test sau khi chạy security scan
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      
      - name: Run Maven Test #chạy unit test
        run: mvn -pl payment -am verify
      
      - name: Install Dependencies
        run: mvn -pl payment -am install -DskipTests
      
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Payment-Service-Unit-Test-Results
          path: "payment/**/*-reports/TEST*.xml"
          reporter: java-junit
      
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/payment/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: 'Payment Coverage Report'
          update-comment: true
      
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: payment-coverage-report
          path: ${{github.workspace}}/payment/target/site/jacoco/
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:check -pl payment -am
      - name: Analyze with SonarCloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f payment
      - name: OWASP Dependency Check
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'yas-payment'
          path: './payment'  
          format: 'HTML'
      - name: Upload OWASP results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: OWASP-Dependency-Check-Report
          path: ${{github.workspace}}/reports

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      
      - name: Run Maven Build
        run: mvn -pl payment -am -DskipTests install
      
      - name: Log in to Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./payment
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/yas-payment:latest