sonar.projectKey=dorayakiiiiz_yas-devops-1-customer
sonar.organization=yas-devops-1

# Source code directories
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Loại trừ các thư mục và file không cần phân tích
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/public/**,\
  **/styles/**,\
  **/constants/**,\
  **/test/**,\
  **/pages/**,\
  **/module/**,\
  **/common/**,\
  **/coverage/**,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/package.json,\
  **/package-lock.json,\
  **/yarn.lock


sonar.test.inclusions=\
  **/test/**/*.test.ts,\

# Loại trừ các file khỏi coverage report
sonar.coverage.exclusions=\
  **/package.json,\
  **/package-lock.json,\
  **/next.config.js,\
  **/next.config.mjs,\
  **/vitest.config.ts,\
  **/jest.config.js,\
  **/playwright.config.ts,\
  **/*.config.js,\
  **/*.config.ts,\
  **/pages/_app.tsx,\
  **/pages/_document.tsx

# Đường dẫn đến coverage report
sonar.javascript.lcov.reportPaths=coverage/lcov.info
