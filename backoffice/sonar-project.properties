sonar.projectKey=dorayakiiiiz_yas-devops-1-customer
sonar.organization=yas-devops-1

# Source code directories
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Loại trừ các thư mục KHÔNG CẦN (BỎ **/module/** và **/common/**)
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/public/**,\
  **/styles/**,\
  **/constants/**,\
  **/test/**,\
  **/pages/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/package.json,\
  **/package-lock.json,\
  **/yarn.lock

# Định nghĩa test files
sonar.tests=.
sonar.test.inclusions=\
  **/test/**/*.test.ts,\
  **/services/**/test/**/*.test.ts

# Chỉ exclude các file THỰC SỰ không cần coverage
sonar.coverage.exclusions=\
  **/package.json,\
  **/package-lock.json,\
  **/next.config.js,\
  **/next.config.mjs,\
  **/vitest.config.ts,\
  **/vitest.setup.ts,\
  **/jest.config.js,\
  **/playwright.config.ts,\
  **/*.config.js,\
  **/*.config.ts,\
  **/pages/**/*,\
  **/components/**/*,\
  **/hooks/**/*,\
  **/constants/**/*,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Đường dẫn đến coverage report
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Tắt lỗi import resolve (giữ nguyên)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S4325
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.ts

sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S1128
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.ts

sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:RESOLVE
sonar.issue.ignore.multicriteria.e3.resourceKey=**/services/**/*.ts